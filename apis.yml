aid: offenderlist
name: OffenderList
description: >-
  OffenderList is a comprehensive online platform that provides information about
  individuals who have been convicted of criminal offenses. The website allows users
  to search for offenders based on various criteria such as name, location, or offense
  type. OffenderList provides important details about each offender, including their
  mugshot, charges, conviction date, and sentence length. OffenderList provides security
  and information-focused organizations API access, batch requests, remote access,
  and internal access to a national sex offender database.
